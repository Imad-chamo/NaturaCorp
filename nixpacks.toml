[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.pdo",
  "php83Extensions.pdo_pgsql",
  "php83Extensions.mbstring",
  "php83Extensions.tokenizer",
  "php83Extensions.xml",
  "php83Extensions.curl",
  "php83Extensions.zip",
  "php83Extensions.gd",
  "php83Extensions.fileinfo",
  "php83Extensions.openssl",
  "php83Extensions.bcmath",
  "composer"
]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache",
  "php artisan event:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --class=RoleAndUserSeeder --force; php artisan storage:link 2>/dev/null; php artisan serve --host=0.0.0.0 --port=$PORT"
